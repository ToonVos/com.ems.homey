<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: auto; }
    body {
      font-family: var(--homey-font-family, -apple-system, sans-serif);
      background: transparent;
      color: var(--homey-text-color, #202124);
      display: flex; flex-direction: column;
      padding: 8px 12px 6px;
    }

    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .title  { font-size: 10px; font-weight: 700; opacity: .45; letter-spacing: .8px; text-transform: uppercase; }
    .mode   { font-size: 9px; padding: 2px 8px; border-radius: 6px; font-weight: 700; white-space: nowrap; }
    .mode-auto   { background: rgba(128,128,128,.12); color: rgba(128,128,128,.7); }
    .mode-manual { background: rgba(249,115,22,.13); color: #f97316; }

    .soc { display: flex; align-items: baseline; gap: 5px; margin-bottom: 6px; }
    .soc-val  { font-size: 26px; font-weight: 800; letter-spacing: -1px; }
    .soc-unit { font-size: 10px; opacity: .45; }
    .soc-arrow{ font-size: 12px; opacity: .4; }
    .soc-target { font-size: 15px; font-weight: 700; color: #f97316; }

    .label { font-size: 9px; font-weight: 700; opacity: .4; text-transform: uppercase; letter-spacing: .6px; margin: 6px 0 4px; }

    .chips { display: flex; gap: 5px; }
    .chip {
      flex: 1; text-align: center; padding: 7px 0; border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 700; border: 1.5px solid rgba(128,128,128,.2);
      background: transparent; color: var(--homey-text-color, #202124); transition: all .12s;
    }
    .chip.sel { border-color: #f97316; background: rgba(249,115,22,.14); color: #f97316; }
    .chip.auto.sel { border-color: #22c55e; background: rgba(34,197,94,.14); color: #22c55e; }

    input[type=datetime-local] {
      width: 100%; padding: 7px 9px; border-radius: 8px; font-size: 12px;
      border: 1.5px solid rgba(128,128,128,.2); background: transparent;
      color: var(--homey-text-color, #202124); font-family: inherit;
    }

    .actions { display: flex; gap: 6px; margin-top: 10px; }
    .btn {
      flex: 1; padding: 9px 0; border-radius: 8px; font-size: 12px; font-weight: 700;
      cursor: pointer; border: none; font-family: inherit;
    }
    .btn-save { background: #f97316; color: #fff; }
    .btn-auto { background: rgba(128,128,128,.14); color: var(--homey-text-color, #202124); }
    .btn:disabled { opacity: .4; cursor: default; }

    .proj { margin: 2px 0 6px; padding: 8px 10px; border-radius: 9px;
            background: rgba(128,128,128,.08); display: flex; flex-direction: column; gap: 3px; }
    .pr-row  { font-size: 12px; opacity: .75; line-height: 1.3; }
    .pr-head { font-size: 13.5px; font-weight: 700; opacity: .95; }
    .pr-muted{ opacity: .55; }
    .pr-foot { opacity: .45; font-size: 10px; }
    .proj .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
    .dot-on  { background: #22c55e; }
    .dot-off { background: rgba(128,128,128,.4); }
    .dot-warn{ background: #f59e0b; }

    .status { margin-top: 8px; font-size: 12px; opacity: .7; line-height: 1.3; text-align: center; }
    .status.err { color: #ef4444; opacity: .95; }
    .status.ok  { color: #22c55e; opacity: .95; }
    .farnote { margin-top: 6px; padding: 7px 9px; border-radius: 8px; font-size: 11.5px; line-height: 1.35;
               background: rgba(59,130,246,.12); color: #3b82f6; }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">🚗 Tesla laaddoel</div>
    <span id="mode" class="mode mode-auto">AUTO</span>
  </div>

  <div class="soc">
    <span class="soc-val"  id="soc">–</span><span class="soc-unit">% nu</span>
    <span class="soc-arrow">→</span>
    <span class="soc-target" id="tgt">–%</span>
  </div>

  <div class="proj" id="proj"></div>

  <div class="label">Doel</div>
  <div class="chips" id="chips">
    <div class="chip auto" data-pct="60">Auto&nbsp;60</div>
    <div class="chip" data-pct="80">80</div>
    <div class="chip" data-pct="90">90</div>
    <div class="chip" data-pct="95">95</div>
    <div class="chip" data-pct="100">100</div>
  </div>

  <div class="label">Klaar op</div>
  <input type="datetime-local" id="deadline" />

  <div class="actions">
    <button class="btn btn-save" id="save">Opslaan</button>
    <button class="btn btn-auto" id="auto">Auto (60% / 07:00)</button>
  </div>

  <div class="status" id="status"></div>
  <div class="farnote" id="farnote" style="display:none"></div>

  <script>
    let state = null;
    let selPct = 60;
    let Homey;

    const $ = (id) => document.getElementById(id);

    // ISO (UTC) → "YYYY-MM-DDTHH:MM" in de Homey-tijdzone (voor datetime-local).
    function isoToLocalInput(iso, tz) {
      const d = new Date(iso);
      const p = new Intl.DateTimeFormat('en-CA', {
        timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', hourCycle: 'h23',
      }).formatToParts(d).reduce((o, x) => (o[x.type] = x.value, o), {});
      return `${p.year}-${p.month}-${p.day}T${p.hour}:${p.minute}`;
    }

    // Hoeveel de wandklok van tz vóórloopt op UTC, op moment `date` (ms).
    function tzOffsetMs(date, tz) {
      const p = new Intl.DateTimeFormat('en-US', {
        timeZone: tz, hour12: false, year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
      }).formatToParts(date).reduce((a, x) => (a[x.type] = x.value, a), {});
      const h = p.hour === '24' ? 0 : Number(p.hour);
      const asUTC = Date.UTC(+p.year, +p.month - 1, +p.day, h, +p.minute, +p.second);
      return asUTC - date.getTime();
    }

    // "YYYY-MM-DDTHH:MM" (wandklok in tz) → ISO (UTC).
    function localInputToIso(val, tz) {
      const [d, t] = val.split('T');
      const [y, mo, day] = d.split('-').map(Number);
      const [h, mi] = t.split(':').map(Number);
      const utcGuess = Date.UTC(y, mo - 1, day, h, mi, 0);
      let off = tzOffsetMs(new Date(utcGuess), tz);
      let res = new Date(utcGuess - off);
      off = tzOffsetMs(res, tz);
      return new Date(utcGuess - off).toISOString();
    }

    function renderChips() {
      document.querySelectorAll('.chip').forEach(c => {
        c.classList.toggle('sel', Number(c.dataset.pct) === selPct);
      });
      $('tgt').textContent = selPct + '%';
    }

    function applyState(s) {
      state = s;
      selPct = s.target_pct;
      $('soc').textContent  = s.tesla_soc == null ? '–' : s.tesla_soc;
      $('mode').textContent = s.active ? 'HANDMATIG' : 'AUTO';
      $('mode').className   = 'mode ' + (s.active ? 'mode-manual' : 'mode-auto');
      $('deadline').value   = isoToLocalInput(s.deadline_iso, s.tz);
      renderChips();
      renderProj(s);

      // Verre deadline (>7 dagen): geen fout, maar uitleg — vakantie-hold tot 'ie nadert.
      const fn = $('farnote');
      if (s.far_deadline) {
        const d = new Date(s.deadline_iso);
        const datum = new Intl.DateTimeFormat('nl-NL', { timeZone: s.tz, weekday: 'short', day: 'numeric', month: 'short' }).format(d);
        fn.textContent = `ℹ️ Doel ${s.target_pct}% gepland voor ${datum}. Tot ~7 dagen ervoor houdt hij ${s.auto_target_pct}% aan (accu-vriendelijk); daarna laadt hij in de goedkoopste uren naar ${s.target_pct}%.`;
        fn.style.display = 'block';
      } else { fn.style.display = 'none'; }
    }

    function hhmm(local) { return local ? String(local).replace(/^.*?(\d{1,2}:\d{2}):\d{2}.*$/, '$1').replace(/:\d\d$/, m => m) : '?'; }
    function shortWhen(local) {
      // "9-6-2026, 05:00:00" → "05:00" (vandaag) of "za 05:00" — kort
      if (!local) return '?';
      const m = String(local).match(/(\d{1,2}):(\d{2})/);
      return m ? `${m[1].padStart(2,'0')}:${m[2]}` : '?';
    }

    function renderProj(s) {
      const el = $('proj');
      const sc = s.scheduler;
      if (!sc) { el.innerHTML = '<div class="pr-row pr-muted">scheduler nog niet gestart…</div>'; return; }
      const surplus = s.charge_mode === 'surplus';

      // 1. Hoofdstatus
      let dot = 'dot-off', icon = '○', head;
      if (sc.decision === 'panic_charge')           { dot = 'dot-on';   icon = '🪫'; head = 'Noodladen (onder bodem)'; }
      else if (sc.charge_now)                        { dot = 'dot-on';   icon = '⚡'; head = surplus ? `Laadt op overschot${sc.amps ? ` @ ${sc.amps}A` : ''}` : `Laadt nu${sc.tier ? ` (${sc.tier})` : ''}`; }
      else if (sc.decision === 'at_target')          { dot = 'dot-on';   icon = '✓';  head = `Op plafond (${sc.ceiling_pct}%)`; }
      else if (sc.decision === 'idle')               { dot = 'dot-on';   icon = '✓';  head = `Boven doel (${sc.target_pct}%) — niets gepland`; }
      else if (sc.decision === 'skip_disconnected')  { dot = 'dot-off';  icon = '🔌'; head = 'Auto niet verbonden'; }
      else if (sc.decision === 'skip_no_soc')        { dot = 'dot-off';  icon = '…';  head = 'SoC onbekend'; }
      else if (sc.decision === 'inactive' || sc.decision === 'mode_not_price') { dot='dot-off'; icon='○'; head='Scheduler inactief'; }
      else                                           { dot = 'dot-warn'; icon = '⏳'; head = surplus ? 'Wacht op zon-overschot' : 'Wacht op goedkoper uur'; }

      const rows = [`<div class="pr-row pr-head"><span class="dot ${dot}"></span>${icon} ${head}</div>`];

      if (sc.connected && surplus) {
        // Overschot+prijs-modus (post-saldering).
        const bits = [];
        if (sc.current_price_eur != null) bits.push(`nu €${sc.current_price_eur.toFixed(3)}/kWh`);
        if (sc.kwh_needed > 0)            bits.push(`verplicht nog ${sc.kwh_needed.toFixed(1)} kWh`);
        if (bits.length) rows.push(`<div class="pr-row">${bits.join(' · ')}</div>`);
        if (!sc.charge_now && sc.next_charge_local)
          rows.push(`<div class="pr-row">⏱ anders verplicht laden ~${shortWhen(sc.next_charge_local)} (goedkoop uur)</div>`);
        else if (!sc.charge_now && (sc.soc != null && sc.target_pct != null && sc.soc >= sc.target_pct))
          rows.push(`<div class="pr-row pr-muted">boven doel → alleen gratis zonne-overschot</div>`);
      } else if (sc.connected) {
        // Prijs-modus.
        const bits = [];
        if (sc.current_price_eur != null) bits.push(`nu €${sc.current_price_eur.toFixed(3)}/kWh`);
        if (sc.kwh_needed > 0)            bits.push(`nog ${sc.kwh_needed.toFixed(1)} kWh`);
        if (bits.length) rows.push(`<div class="pr-row">${bits.join(' · ')}</div>`);

        if (!sc.charge_now && sc.next_charge_local)
          rows.push(`<div class="pr-row">⏱ start ~${shortWhen(sc.next_charge_local)} (goedkoop uur)</div>`);

        if (sc.kwh_needed > 0 && sc.decision !== 'panic_charge') {
          const parts = [];
          if (sc.ready_by_local)  parts.push(`doel ${sc.target_pct}% ~${shortWhen(sc.ready_by_local)}`);
          if (sc.ceil_ready_local && sc.ceiling_pct > sc.target_pct) parts.push(`plafond ${sc.ceiling_pct}% ~${shortWhen(sc.ceil_ready_local)}`);
          if (parts.length) rows.push(`<div class="pr-row pr-muted">klaar: ${parts.join(' · ')}</div>`);
        }
      }

      // Voet: modus + laatste update
      const modus = sc.mode === 'dryrun' ? '🧪 proef' : '🟢 live';
      rows.push(`<div class="pr-row pr-foot">${modus}${sc.updated_local ? ` · ${shortWhen(sc.updated_local)}` : ''}</div>`);

      el.innerHTML = rows.join('');
    }

    function setStatus(msg, kind) {
      const el = $('status');
      el.textContent = msg || '';
      el.className = 'status' + (kind ? ' ' + kind : '');
    }

    // Runtime-resize op de werkelijke inhoud (Homey.setHeight), zodat er geen
    // witruimte onder de knoppen blijft. Homey.ready zet alleen de begin-hoogte.
    function fitHeight() {
      const h = Math.ceil(document.body.scrollHeight) + 2;
      try {
        if (typeof Homey.setHeight === 'function') Homey.setHeight(h);
        else Homey.ready({ height: h });
      } catch (_) {}
    }

    async function load() {
      try { applyState(await Homey.api('GET', '/getOverride', {})); }
      catch (e) { setStatus('Laden mislukt', 'err'); }
      finally { fitHeight(); }
    }

    async function save() {
      setStatus('Opslaan…');
      try {
        const iso = localInputToIso($('deadline').value, state.tz);
        const s = await Homey.api('POST', '/setOverride', { target_pct: selPct, deadline_iso: iso });
        applyState(s);
        setStatus('Opgeslagen ✓', 'ok');
      } catch (e) {
        setStatus(e.message || 'Opslaan mislukt', 'err');
      }
    }

    async function auto() {
      setStatus('Terug naar auto…');
      try { applyState(await Homey.api('POST', '/clearOverride', {})); setStatus('Auto-modus ✓', 'ok'); }
      catch (e) { setStatus(e.message || 'Mislukt', 'err'); }
    }

    function onHomeyReady(_Homey) {
      Homey = _Homey;
      document.querySelectorAll('.chip').forEach(c =>
        c.addEventListener('click', () => { selPct = Number(c.dataset.pct); renderChips(); }));
      $('save').addEventListener('click', save);
      $('auto').addEventListener('click', auto);
      Homey.ready();                // widget tonen; hoogte volgt via setHeight()
      load();                       // rendert + fitHeight() → setHeight op de inhoud
      setInterval(load, 60_000);
    }
  </script>
</body>
</html>
