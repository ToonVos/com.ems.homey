<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: auto; }
    body {
      font-family: var(--homey-font-family, -apple-system, sans-serif);
      background: transparent;
      color: var(--homey-text-color, #1A1916);
      display: flex; flex-direction: column;
      padding: 10px 14px 10px;
      gap: 0;
    }

    /* ── Header ── */
    .head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .head-logo { flex-shrink: 0; opacity: .7; }
    .head-name { font-size: 14px; font-weight: 600; line-height: 1; }
    .head-sub  { font-size: 11px; opacity: .5; margin-top: 2px; }
    .mode-badge {
      margin-left: auto; font-size: 9px; padding: 2px 8px; border-radius: 6px;
      font-weight: 700; white-space: nowrap;
    }
    .mode-auto   { background: rgba(128,128,128,.12); color: rgba(128,128,128,.7); }
    .mode-manual { background: rgba(249,115,22,.13);  color: #f97316; }

    /* ── Batterijbalk ── */
    .bat-section { margin-bottom: 10px; }
    .bat-lbl { font-size: 11px; font-weight: 600; opacity: .5; margin-bottom: 6px; }
    .bat-wrap { position: relative; }
    .bat-track {
      height: 44px; display: flex; border-radius: 8px; overflow: hidden;
    }
    .bat-green { background: #34C489; display: flex; align-items: center; min-width: 0; }
    .bat-blue  { display: flex; align-items: center; justify-content: flex-end; min-width: 0; }
    .bat-gray  { flex: 1; }
    .bat-num-green {
      font-size: 13px; font-weight: 600; color: #C8F5E2;
      font-family: monospace; padding-left: 10px; white-space: nowrap;
    }
    .bat-num-blue {
      font-size: 13px; font-weight: 600;
      font-family: monospace; padding-right: 8px; white-space: nowrap;
    }
    .bat-limit {
      position: absolute; top: 0; bottom: 0;
      display: flex; align-items: center;
      border-left: 2px solid #378ADD;
      pointer-events: none;
    }

    /* licht */
    @media (prefers-color-scheme: light) {
      .bat-blue  { background: #C4DAFA; }
      .bat-gray  { background: rgba(0,0,0,.08); }
      .bat-num-blue { color: #185FA5; }
    }
    /* donker */
    @media (prefers-color-scheme: dark) {
      .bat-blue  { background: #1A3A5C; }
      .bat-gray  { background: rgba(255,255,255,.07); }
      .bat-num-blue { color: #85B7EB; }
    }

    /* ── Planning rows ── */
    .rows {
      display: flex; flex-direction: column; margin-bottom: 10px;
      max-height: 164px; /* 2 rijen × ~82px */
      overflow-y: auto;
    }
    .prow {
      display: grid;
      grid-template-columns: 4px 1fr 52px 56px 36px;
      align-items: center;
      gap: 0 8px;
      padding: 7px 0;
      border-bottom: 0.5px solid rgba(128,128,128,.1);
    }
    .prow:last-child { border-bottom: none; }
    .pr-accent { width: 4px; height: 28px; border-radius: 2px; }
    .pr-info   { min-width: 0; }
    .pr-time   { font-size: 12px; font-weight: 600; font-family: monospace; white-space: nowrap; }
    .pr-sub    { font-size: 10px; opacity: .5; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pr-cost   { text-align: right; }
    .pr-cost-num { font-size: 13px; font-weight: 700; }
    .pr-cost-sub { font-size: 9px; opacity: .45; }
    .pr-bubble {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; font-family: monospace; line-height: 1.2;
      text-align: center;
    }
    .pr-date { font-size: 9px; opacity: .45; text-align: right; white-space: nowrap; }

    /* ── Statusregel (huidige status, afwijkend van planningsregels) ── */
    .srow {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 11px; margin-bottom: 9px;
      border-radius: 10px;
    }
    .sr-dot    { width: 9px; height: 9px; border-radius: 50%; flex: none; }
    .sr-info   { min-width: 0; flex: 1; }
    .sr-status { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sr-sub    { font-size: 10px; opacity: .6; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Scheidingslijn ── */
    .divider { height: 0.5px; background: rgba(128,128,128,.15); margin: 6px 0 10px; }

    /* ── Controls ── */
    .label { font-size: 9px; font-weight: 700; opacity: .4; text-transform: uppercase; letter-spacing: .6px; margin: 0 0 5px; }
    .chips { display: flex; gap: 5px; margin-bottom: 10px; }
    .chip {
      flex: 1; text-align: center; padding: 7px 0; border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 700; border: 1.5px solid rgba(128,128,128,.2);
      background: transparent; color: var(--homey-text-color, #1A1916); transition: all .12s;
    }
    .chip.sel       { border-color: #f97316; background: rgba(249,115,22,.14); color: #f97316; }
    .chip.auto.sel  { border-color: #22c55e; background: rgba(34,197,94,.14);  color: #22c55e; }

    input[type=datetime-local] {
      width: 100%; padding: 7px 9px; border-radius: 8px; font-size: 12px; margin-bottom: 10px;
      border: 1.5px solid rgba(128,128,128,.2); background: transparent;
      color: var(--homey-text-color, #1A1916); font-family: inherit;
    }

    .actions { display: flex; gap: 6px; }
    .btn {
      flex: 1; padding: 9px 0; border-radius: 8px; font-size: 12px; font-weight: 700;
      cursor: pointer; border: none; font-family: inherit;
    }
    .btn-save { background: #f97316; color: #fff; }
    .btn-auto { background: rgba(128,128,128,.14); color: var(--homey-text-color, #1A1916); }
    .btn:disabled { opacity: .4; cursor: default; }

    .status { margin-top: 8px; font-size: 12px; opacity: .7; line-height: 1.3; text-align: center; }
    .status.err  { color: #ef4444; opacity: .95; cursor: pointer; }
    .status.ok   { color: #22c55e; opacity: .95; }
    .status.warn { color: #f59e0b; opacity: .95; }

    /* ── Hint banner ── */
    .hint {
      margin-top: 8px; padding: 7px 10px; border-radius: 8px;
      background: rgba(186,117,23,.12); color: #BA7517;
      font-size: 10px; display: flex; align-items: center; gap: 6px;
    }
    @media (prefers-color-scheme: dark) {
      .hint { background: rgba(239,159,39,.12); color: #EF9F27; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="head">
    <svg class="head-logo" width="30" height="30" viewBox="0 0 30 30">
      <rect width="30" height="30" rx="15" fill="rgba(128,128,128,.15)"/>
      <path fill-rule="evenodd" fill="currentColor"
        d="M6.5 10.2 Q6 8.2 15 8.2 Q24 8.2 23.5 10.2 L21.8 11.8 Q19.8 10.2 16.5 10.6 L15 23 L13.5 10.6 Q10.2 10.2 8.2 11.8 Z
           M13.2 9.4 Q15 12 16.8 9.4 Q15.6 8.2 15 8.2 Q14.4 8.2 13.2 9.4 Z"/>
    </svg>
    <div>
      <div class="head-name">Tesla Model S</div>
      <div class="head-sub" id="connStatus">–</div>
    </div>
    <span class="mode-badge mode-auto" id="modeBadge">AUTO</span>
  </div>

  <!-- Batterijbalk -->
  <div class="bat-section">
    <div class="bat-lbl" id="batLbl">doel · –</div>
    <div class="bat-wrap">
      <div class="bat-track" id="batTrack">
        <div class="bat-green" id="batGreen" style="width:0%">
          <span class="bat-num-green" id="batNumGreen"></span>
        </div>
        <div class="bat-blue" id="batBlue" style="width:0%">
          <span class="bat-num-blue" id="batNumBlue"></span>
        </div>
        <div class="bat-gray" id="batGray"></div>
      </div>
      <div class="bat-limit" id="batLimit" style="left:90%"></div>
    </div>
  </div>

  <!-- Planning rows -->
  <div class="rows" id="planRows"></div>

  <div class="divider"></div>

  <!-- Controls -->
  <div class="label">Doel</div>
  <div class="chips" id="chips">
    <div class="chip auto" data-pct="60">Auto&nbsp;60</div>
    <div class="chip" data-pct="80">80</div>
    <div class="chip" data-pct="90">90</div>
    <div class="chip" data-pct="95">95</div>
    <div class="chip" data-pct="100">100</div>
  </div>

  <div class="label">Klaar op</div>
  <input type="datetime-local" id="deadline" />

  <div class="actions">
    <button class="btn btn-save" id="save">Opslaan</button>
    <button class="btn btn-auto" id="auto">Auto (60% / 07:00)</button>
  </div>

  <div class="status" id="status"></div>

  <script>
    let state = null;
    let selPct = 60;
    let Homey;

    const $ = (id) => document.getElementById(id);

    function isoToLocalInput(iso, tz) {
      try {
        const d = new Date(iso);
        if (isNaN(d)) return '';
        const opts = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hourCycle: 'h23' };
        if (tz) opts.timeZone = tz;
        const p = new Intl.DateTimeFormat('en-CA', opts).formatToParts(d).reduce((o, x) => (o[x.type] = x.value, o), {});
        return `${p.year}-${p.month}-${p.day}T${p.hour}:${p.minute}`;
      } catch (_) { return ''; }
    }

    function tzOffsetMs(date, tz) {
      const p = new Intl.DateTimeFormat('en-US', {
        timeZone: tz, hour12: false, year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
      }).formatToParts(date).reduce((a, x) => (a[x.type] = x.value, a), {});
      const h = p.hour === '24' ? 0 : Number(p.hour);
      const asUTC = Date.UTC(+p.year, +p.month - 1, +p.day, h, +p.minute, +p.second);
      return asUTC - date.getTime();
    }

    function localInputToIso(val, tz) {
      const [d, t] = val.split('T');
      const [y, mo, day] = d.split('-').map(Number);
      const [h, mi] = t.split(':').map(Number);
      const utcGuess = Date.UTC(y, mo - 1, day, h, mi, 0);
      let off = tzOffsetMs(new Date(utcGuess), tz);
      let res = new Date(utcGuess - off);
      off = tzOffsetMs(res, tz);
      return new Date(utcGuess - off).toISOString();
    }

    function shortWhen(local) {
      if (!local) return '?';
      const m = String(local).match(/(\d{1,2}):(\d{2})/);
      return m ? `${m[1].padStart(2,'0')}:${m[2]}` : '?';
    }

    function shortDate(local) {
      if (!local) return '';
      const m = String(local).match(/(\d{1,2})-(\d{1,2})-(\d{4})/);
      if (m) {
        const months = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
        return `${m[1]} ${months[+m[2]-1]}`;
      }
      return '';
    }

    function renderChips() {
      document.querySelectorAll('.chip').forEach(c =>
        c.classList.toggle('sel', Number(c.dataset.pct) === selPct));
    }

    function renderBattery(sc, overrideTarget) {
      const soc    = sc?.soc ?? null;
      const target = overrideTarget ?? sc?.target_pct ?? 90;
      const deadlineLbl = $('batLbl');

      // Datum uit ready_by_local of state.deadline_iso
      let datumStr = '–';
      if (sc?.ready_by_local) {
        datumStr = `${shortDate(sc.ready_by_local)} ${shortWhen(sc.ready_by_local)}`;
      } else if (state?.deadline_iso && state?.tz) {
        try {
          const d = new Date(state.deadline_iso);
          datumStr = new Intl.DateTimeFormat('nl-NL', {
            timeZone: state.tz, day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit',
          }).format(d);
        } catch(_) {}
      }
      deadlineLbl.textContent = `doel · ${datumStr}`;

      if (soc == null) {
        $('batGreen').style.width = '0%';
        $('batBlue').style.width  = '0%';
        $('batNumGreen').textContent = '';
        $('batNumBlue').textContent  = '';
        $('batLimit').style.left = target + '%';
        return;
      }

      const green = Math.min(soc, 100);
      const blue  = Math.max(0, Math.min(target - soc, 100 - green));

      $('batGreen').style.width = green + '%';
      $('batBlue').style.width  = blue  + '%';
      $('batNumGreen').textContent = green + '%';
      $('batNumBlue').textContent  = blue > 3 ? target + '%' : '';
      $('batLimit').style.left = target + '%';
    }

    function renderRows(sc, s) {
      const el = $('planRows');
      if (!sc) { el.innerHTML = ''; return; }

      const rows = [];
      const soc    = sc.soc ?? null;
      const target = sc.target_pct ?? 90;
      const windows = sc.plan_windows || [];

      // Statusregel = altijd de eerste rij: de huidige toestand (laadt/wacht/…).
      // Bewust afwijkend van de planningsregels: kaart-vorm met tint, géén kosten,
      // géén van→tot-bolletje en géén datum/"nu" — dat is alleen voor de planning.
      function makeStatusRow(dotColor, bg, textColor, statusStr, subStr) {
        return `<div class="srow" style="background:${bg}">
          <div class="sr-dot" style="background:${dotColor}"></div>
          <div class="sr-info">
            <div class="sr-status" style="color:${textColor}">${statusStr}</div>
            ${subStr ? `<div class="sr-sub">${subStr}</div>` : ''}
          </div>
        </div>`;
      }

      function makeRow(accent, timeStr, subStr, costStr, bubbleHtml, bubbleBg, bubbleColor, dateStr) {
        return `<div class="prow">
          <div class="pr-accent" style="background:${accent}"></div>
          <div class="pr-info">
            <div class="pr-time">${timeStr}</div>
            ${subStr ? `<div class="pr-sub">${subStr}</div>` : ''}
          </div>
          <div class="pr-cost">
            ${costStr ? `<div class="pr-cost-num" style="color:${accent}">${costStr}</div>` : ''}
          </div>
          <div class="pr-bubble" style="background:${bubbleBg};color:${bubbleColor}">
            ${bubbleHtml}
          </div>
          <div class="pr-date">${dateStr || ''}</div>
        </div>`;
      }

      // Kleurcodering statusregel — 3 tonen:
      //   GROEN  = actief laden (goed bezig)
      //   AMBER  = aandacht nodig (afgekoppeld of wil-laden-maar-laadt-niet)
      //   GRIJS  = passief/neutraal (wacht, opstart, spaarstand, plan-berekening)
      const ST_GREEN = ['#1D9E75', 'rgba(29,158,117,.12)', '#5DCAA5'];
      const ST_AMBER = ['#E0A100', 'rgba(224,161,0,.12)', '#E0A100'];
      const ST_GRAY  = ['rgba(128,128,128,.5)', 'rgba(128,128,128,.08)', 'rgba(128,128,128,.75)'];

      if (s?.far_deadline) {
        rows.push(makeStatusRow(...ST_GRAY, '🍃 Spaarstand', `doel ${target}% gepland voor vertrek`));
      } else if (!sc.connected) {
        // Afgekoppeld. Twee gevallen:
        //  • accu al ≥ doel → niets te laden, aansluiten niet nodig → GRIJS (neutraal).
        //  • accu < doel    → "koppel aan vóór …" oproep als statusregel → AMBER (actie).
        const needCharge = (soc != null && target != null) ? soc < target : true;
        if (needCharge) {
          const fw = windows[0];
          const sub = fw
            ? `koppel vóór ${shortDate(fw.from_local)} ${shortWhen(fw.from_local)} aan om dit plan te halen`
            : 'koppel aan om te laden';
          rows.push(makeStatusRow(...ST_AMBER, 'Afgekoppeld', sub));
        } else {
          rows.push(makeStatusRow(...ST_GRAY, 'Afgekoppeld', `al op doel (${target}%) — aansluiten niet nodig`));
        }
      } else {
        // Aangekoppeld: huidige laadtoestand.
        if (sc.charging_actual === true) {
          // De auto laadt ÉCHT (Tesla-boolean charging_on/charging_state), niet alleen 'wil'.
          rows.push(makeStatusRow(...ST_GREEN, 'Laadt', ''));
        } else if (sc.charge_now) {
          // We WILLEN laden maar de auto laadt (nog) niet. Toon de echte reden i.p.v. 'laadt'.
          const probleem = sc.no_power || (sc.drive_error && sc.drive_error !== 'null')
                        || (sc.car_limit != null && sc.car_limit < target);
          if (probleem) {
            const r = [];
            if (sc.no_power) r.push('geen stroom op kabel — laadpunt aan?');
            else if (sc.drive_error === 'could_not_wake_buses') r.push('auto-bus slaapt — opnieuw proberen');
            else if (sc.drive_error && sc.drive_error !== 'null') r.push('auto-fout: ' + sc.drive_error);
            if (sc.car_limit != null && sc.car_limit < target) r.push(`auto-laadlimiet ${sc.car_limit}%`);
            rows.push(makeStatusRow(...ST_AMBER, '⚠ Wil laden — auto laadt niet', r.join(' · ')));
          } else {
            // Geen concreet probleem → waarschijnlijk opstart-lag (Tesla-poll ~1 min).
            rows.push(makeStatusRow(...ST_GRAY, 'Laden starten…', ''));
          }
        } else if (sc.kwh_needed != null && sc.kwh_needed <= 0) {
          // Niets meer te laden (doel én plafond gehaald) → klaar, geen "wachten".
          // Grijs (niets te doen), niet groen — groen is voorbehouden aan actief laden.
          const dl = shortDate(sc.deadline_local);
          rows.push(makeStatusRow(...ST_GRAY, 'Op doel — gereed', dl ? `klaar voor ${dl}` : 'klaar voor vertrek'));
        } else {
          rows.push(makeStatusRow(...ST_GRAY, 'Wacht op goedkoop uur', 'te duur'));
        }
      }

      if (!s?.far_deadline) {

        // Laadvensters (groen = verplicht, blauw = opportunistisch)
        // Filter vensters zonder netto SoC-bijdrage (artefact van overlappende banden)
        const meaningful = windows.filter(w => w.to_pct > w.from_pct + 1);
        if (meaningful.length > 0) {
          for (const w of meaningful) {
            const isGreen = w.type === 'mand';
            const accent       = isGreen ? '#1D9E75' : '#378ADD';
            const bubbleBg     = isGreen ? 'rgba(29,158,117,.15)' : 'rgba(55,138,221,.12)';
            const bubbleColor  = isGreen ? '#5DCAA5' : '#85B7EB';
            const timeStr      = `${shortWhen(w.from_local)} – ${shortWhen(w.to_local)}`;
            const subParts     = [];
            if (w.kwh)               subParts.push(`~${w.kwh} kWh`);
            if (w.avg_price_eur != null) subParts.push(`€${Number(w.avg_price_eur).toFixed(2)}/kWh`);
            const costStr      = w.cost_eur != null ? `~€${Math.round(w.cost_eur)}` : '';
            const bubbleHtml   = `${w.from_pct}→<br>${w.to_pct}%`;
            const dateStr      = shortDate(w.from_local);
            rows.push(makeRow(accent, timeStr, subParts.join(' · '), costStr, bubbleHtml, bubbleBg, bubbleColor, dateStr));
          }
        } else if (windows.length > 0) {
          // Alle vensters zijn no-op (auto al op doel) — toon eerste als indicatie
          const w = windows[0];
          const accent = w.type === 'mand' ? '#1D9E75' : '#378ADD';
          rows.push(makeRow(accent, `${shortWhen(w.from_local)} – ${shortWhen(w.to_local)}`, `klaar op ${target}%`, '', `${target}%`, 'rgba(128,128,128,.1)', 'rgba(128,128,128,.5)', shortDate(w.from_local)));
        }
        // Afgekoppeld zonder plan: de "Afgekoppeld"-statusregel hierboven dekt dit al.
      }

      el.innerHTML = rows.join('');

      // De vroegere losse "koppel aan"-banner zit nu in de Afgekoppeld-statusregel.
      const hint = document.getElementById('connHint');
      if (hint) hint.remove();
    }

    // Voer een render-stap uit; een fout in één sectie mag de rest niet slopen.
    function safe(fn, label) {
      try { fn(); } catch (e) { console.error('[widget] render-fout in ' + label + ':', e); }
    }

    function applyState(s) {
      if (!s || typeof s !== 'object') return;
      state = s;
      selPct = s.target_pct ?? selPct;
      const sc = s.scheduler;

      safe(() => renderChips(), 'chips');
      safe(() => {
        const connected = sc?.connected;
        $('connStatus').textContent = connected === true ? '● Aangekoppeld'
                                    : connected === false ? '○ Afgekoppeld' : '○ –';
        $('modeBadge').textContent = s.active ? 'HANDMATIG' : 'AUTO';
        $('modeBadge').className   = 'mode-badge ' + (s.active ? 'mode-manual' : 'mode-auto');
        $('deadline').value = isoToLocalInput(s.deadline_iso, s.tz);
      }, 'header');
      safe(() => renderBattery(sc, s.target_pct), 'battery');
      safe(() => renderRows(sc, s), 'rows');
    }

    function setStatus(msg, kind) {
      const el = $('status');
      el.textContent = msg || '';
      el.className = 'status' + (kind ? ' ' + kind : '');
    }

    let _lastH = 0;
    function fitHeight() {
      const h = Math.ceil(document.body.scrollHeight) + 4;
      if (Math.abs(h - _lastH) < 3) return;   // voorkomt ratchet bij herhaalde calls
      _lastH = h;
      try {
        if (typeof Homey.setHeight === 'function') Homey.setHeight(h);
        else Homey.ready({ height: h });
      } catch (_) {}
    }

    // ── Verbinding: PUSH (primair) + POLL (fallback) ──────────────────────
    // Probleem: op mobiel valt de link telefoon↔Homey weg/terug (achtergrond,
    // wifi↔mobiel). Homey ruimt dan de server-side widget-instantie op; de iframe
    // draait door met een dode instance-id → élke Homey.api() geeft "Widget Not
    // Found". Een iframe-reload herstelt dit NIET (zelfde dode id wordt door de
    // parent opnieuw geïnjecteerd); alleen de Homey-app die de widget her-rendert
    // (opnieuw selecteren) maakt een verse instance. Dat kunnen we van binnenuit
    // niet forceren — dus leunen we op het REALTIME-kanaal: de app pusht state via
    // `homey.api.realtime('ems_tesla_state', …)`; dat socket.io-abonnement doet
    // auto-reconnect en blijft updaten waar de pull-call dood is. De api()-call
    // blijft alleen voor de eerste paint + als trage fallback (best-effort).
    let _lastOkTs = 0;
    let _startTs  = 0;
    let _retryTimer = null;
    const BLANK_GRACE_MS = 8_000;    // nooit geladen: na 8s → tikbare optie
    const STALE_MS       = 130_000;  // eerder geladen: na ~2 gemiste polls → idem

    function applyGood(data) {
      if (!data) return;
      _lastOkTs = Date.now();
      applyState(data);
      setStatus('');
      fitHeight();
    }

    // Best-effort pull. Faalt stil (scherm blijft staan); de UI-staat wordt door
    // refreshConnUI bepaald, herstel door de realtime-push of een volgende poging.
    async function load() {
      try { applyGood(await Homey.api('GET', '/getOverride', {})); } catch (_) {}
    }

    function connState() {
      const now = Date.now();
      if (_lastOkTs) return (now - _lastOkTs > STALE_MS) ? 'lost' : 'ok';
      return (now - _startTs > BLANK_GRACE_MS) ? 'lost' : 'connecting';
    }

    // Toont snel (≤8s) de handmatige optie i.p.v. eindeloos "Verbinden…".
    // Reageert ALLEEN op een echte staat-wissel (niet elke seconde) zodat fitHeight
    // niet in een ratchet-lus belandt die de widget met lege ruimte laat groeien.
    let _lastConnState = null;
    function refreshConnUI() {
      const s = connState();
      if (s === _lastConnState) return;
      _lastConnState = s;
      if (s === 'ok') return;                       // status door applyGood beheerd
      setStatus(s === 'connecting' ? 'Verbinden…' : 'Geen verbinding — tik om te verbinden',
                s === 'connecting' ? 'warn' : 'err');
      fitHeight();
    }

    // Auto-reconnect = de tik, maar automatisch. Een reload herstelt alleen als de
    // app in de VOORGROND staat (brug live). Dat moment is exact wanneer de widget
    // weer zichtbaar wordt → luister op visibilitychange/pageshow en doe dán hetzelfde
    // als een handmatige tik: eerst een goedkope pull, en blijft het stil → reload.
    let _lastReloadTs = 0;
    function reconnectIfStale() {
      if (document.visibilityState === 'hidden') return;
      if (connState() !== 'lost') return;
      load();                                   // goedkope poging; soms al genoeg
      const now = Date.now();
      if (now - _lastReloadTs < 5_000) return;  // loop-guard
      _lastReloadTs = now;
      setTimeout(() => {                        // alleen reloaden als pull niet herstelde
        if (connState() === 'lost') { try { location.reload(); } catch (_) {} }
      }, 700);
    }
    document.addEventListener('visibilitychange', reconnectIfStale);
    window.addEventListener('pageshow', reconnectIfStale);

    // Adaptieve retry: snel in de eerste ~12s (zodat 't bij opstart vlot pakt),
    // daarna rustig. De realtime-push kan tussendoor altijd herstellen.
    function scheduleRetry() {
      if (_retryTimer) clearTimeout(_retryTimer);
      const s = connState();
      const fast = s !== 'ok' && Date.now() - (_lastOkTs || _startTs) < 12_000;
      const delay = s === 'ok' ? 60_000 : (fast ? 2_000 : 30_000);
      _retryTimer = setTimeout(async () => { await load(); refreshConnUI(); scheduleRetry(); }, delay);
    }

    async function save() {
      setStatus('Opslaan…');
      try {
        const iso = localInputToIso($('deadline').value, state.tz);
        const s = await Homey.api('POST', '/setOverride', { target_pct: selPct, deadline_iso: iso });
        _lastOkTs = Date.now();
        applyState(s);
        setStatus('Opgeslagen ✓', 'ok');
      } catch (e) {
        setStatus(e.message || 'Opslaan mislukt', 'err');
      } finally { fitHeight(); }
    }

    async function auto() {
      setStatus('Terug naar auto…');
      try {
        _lastOkTs = Date.now();
        applyState(await Homey.api('POST', '/clearOverride', {}));
        setStatus('Auto-modus ✓', 'ok');
      } catch (e) {
        setStatus(e.message || 'Mislukt', 'err');
      } finally { fitHeight(); }
    }

    function onHomeyReady(_Homey) {
      Homey = _Homey;
      document.querySelectorAll('.chip').forEach(c =>
        c.addEventListener('click', () => { selPct = Number(c.dataset.pct); renderChips(); }));
      $('save').addEventListener('click', save);
      $('auto').addEventListener('click', auto);
      // Vangnet: tik op de foutmelding = volledige re-handshake. In de praktijk
      // herstelt dit wél (de tik her-focust de widget zodat de reload op een verse
      // sessie landt) — handmatig laatste redmiddel bovenop de realtime-push.
      $('status').addEventListener('click', () => {
        if ($('status').classList.contains('err')) { try { location.reload(); } catch (_) {} }
      });

      // PRIMAIR: realtime-push van de app. Overleeft de drops die api() doodmaken.
      try { Homey.on('ems_tesla_state', applyGood); } catch (_) {}

      _startTs = Date.now();
      Homey.ready();
      load();                            // eerste paint via pull
      setInterval(refreshConnUI, 1_000); // ververst de verbindings-melding (geen netwerk)
      scheduleRetry();                   // adaptieve retry + trage fallback-poll
    }
  </script>
</body>
</html>
